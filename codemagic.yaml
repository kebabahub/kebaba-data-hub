workflows:
  android-release:
    name: Android APK + App Bundle (signed)
    max_build_duration: 30
    environment:
      flutter: stable
      android_signing:
        - kebabadatahub_keystore # name of the keystore reference you create in Codemagic's UI — see README
      vars:
        PACKAGE_NAME: "com.kebabadatahub.kebabadatahub" # must match android/app/build.gradle's applicationId once generated below
    scripts:
      - name: Generate native platform folders (android/, ios/) if missing
        script: |
          if [ ! -d android ]; then
            flutter create --platforms=android --org com.kebabadatahub --project-name kebabadatahub .
          fi
          # flutter create's template test references a MyApp class that
          # doesn't exist in this project (root widget is KebabaApp) — remove
          # it so `flutter analyze` doesn't fail on generated boilerplate.
          rm -f test/widget_test.dart
          # flutter_local_notifications requires core library desugaring —
          # android/ is regenerated fresh every build (not committed to git),
          # so this has to be injected here rather than edited once in-repo.
          GRADLE_FILE=android/app/build.gradle.kts
          if [ ! -f "$GRADLE_FILE" ]; then GRADLE_FILE=android/app/build.gradle; fi
          if [ "$GRADLE_FILE" = "android/app/build.gradle.kts" ]; then
            {
              echo ""
              echo "android {"
              echo "    compileOptions {"
              echo "        isCoreLibraryDesugaringEnabled = true"
              echo "    }"
              echo "}"
              echo ""
              echo "dependencies {"
              echo "    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.1.4\")"
              echo "}"
            } >> "$GRADLE_FILE"
          else
            {
              echo ""
              echo "android {"
              echo "    compileOptions {"
              echo "        coreLibraryDesugaringEnabled true"
              echo "    }"
              echo "}"
              echo ""
              echo "dependencies {"
              echo "    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'"
              echo "}"
            } >> "$GRADLE_FILE"
          fi
          echo "----- $GRADLE_FILE (final content) -----"
          cat "$GRADLE_FILE"
          echo "----- end of $GRADLE_FILE -----"
      - name: Get packages
        script: flutter pub get
      - name: Analyze (fails the build on real errors only — warnings/infos are style lints, not release blockers)
        script: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Build signed APK
        script: flutter build apk --release
      - name: Build signed App Bundle (what Google Play actually wants)
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      email:
        recipients:
          - kebabadatahubng@gmail.com

  ios-archive:
    name: iOS Archive (for App Store Connect upload)
    max_build_duration: 60
    instance_type: mac_mini_m2 # macOS runner — this is what makes an iOS build possible without owning a Mac
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kebabadatahub.kebabadatahub # must match what you register in App Store Connect
    scripts:
      - name: Generate native platform folders (android/, ios/) if missing
        script: |
          if [ ! -d ios ]; then
            flutter create --platforms=ios --org com.kebabadatahub --project-name kebabadatahub .
          fi
          rm -f test/widget_test.dart
      - name: Get packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      # Auto-publish to App Store Connect needs an integration connected first
      # (Codemagic → Teams → Integrations → App Store Connect, which needs your
      # Apple Developer account). Until then this just emails you the .ipa —
      # add the app_store_connect block back once that's connected.
      email:
        recipients:
          - kebabadatahubng@gmail.com
